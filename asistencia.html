<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gestiona la asistencia de tus alumnos semana a semana por materias." />
  <title>Control de Asistencia · App</title>
  <script>!function(){var t=localStorage.getItem('theme');if(t==='light'||!t&&matchMedia('(prefers-color-scheme:light)').matches)document.documentElement.classList.add('light-mode')}()</script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── App shell ─────────────────────────────────────── */
    body { min-height: 100vh; display: flex; flex-direction: column; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; white-space: nowrap; letter-spacing: -.02em; }
    header h1 span { color: var(--accent); }

    /* ── Tabs ──────────────────────────────────────────── */
    .tabs { display: flex; gap: 4px; }
    .tab-btn {
      padding: 7px 16px;
      border-radius: var(--r-sm);
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      background: transparent;
      color: var(--text-2);
      transition: background .15s, color .15s;
    }
    /* texto oscuro sobre verde — contraste ~9.6:1 */
    .tab-btn.active { background: var(--accent); color: var(--bg); }
    .tab-btn:hover:not(.active) { background: var(--surface-2); color: var(--text); }
    .tab-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── File actions ──────────────────────────────────── */
    .file-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 1px solid var(--border);
      padding-left: 16px;
      margin-left: 4px;
    }
    .save-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .75rem;
      color: var(--text-3);
      white-space: nowrap;
    }
    .save-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      transition: background .3s;
    }
    .save-status.dirty::before { background: var(--warn); }
    #save-indicator { font-size: .75rem; }

    /* ── Materia bar ───────────────────────────────────── */
    .materia-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      position: sticky;
      top: 57px;
      z-index: 99;
    }
    .materia-bar-label {
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .08em;
      white-space: nowrap;
    }
    /* Override global select width dentro de materia-bar */
    #materia-select {
      width: auto;
      min-width: 180px;
      max-width: 320px;
      font-weight: 600;
      cursor: pointer;
    }
    .materia-actions { display: flex; gap: 6px; margin-left: 2px; }

    /* ── Main layout ───────────────────────────────────── */
    main {
      flex: 1;
      padding: 28px 24px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }
    .view { display: none; }
    .view.active { display: block; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title { font-size: 1rem; font-weight: 700; letter-spacing: -.01em; }

    /* ── Alumnos ───────────────────────────────────────── */
    .add-form { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .student-list { display: flex; flex-direction: column; gap: 8px; }
    .student-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px 16px;
      animation: fadeIn .2s ease;
    }
    .student-item span { display: flex; align-items: center; gap: 10px; font-weight: 500; }
    .student-num {
      background: var(--surface);
      color: var(--text-3);
      font-size: .72rem;
      padding: 2px 7px;
      border-radius: 99px;
    }
    .import-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
    .import-section label { display: block; margin-bottom: 8px; font-size: .875rem; color: var(--text-2); }

    /* ── Asistencia ────────────────────────────────────── */
    .week-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px 20px;
      margin-bottom: 20px;
      justify-content: space-between;
    }
    .week-info { text-align: center; }
    .week-label { font-size: 1rem; font-weight: 700; letter-spacing: -.02em; }
    .week-date  { font-size: .8rem; color: var(--text-2); margin-top: 2px; }
    .week-stat  { font-size: .8rem; color: var(--text-2); }
    .progress-bar-wrap {
      background: var(--surface-2);
      border-radius: 99px;
      height: 5px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width .3s;
    }

    .attendance-grid { display: flex; flex-direction: column; gap: 6px; }
    .att-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px 18px;
      transition: border-color .15s;
    }
    .att-row.present { border-color: var(--present); }
    .att-row.absent  { border-color: var(--absent); }
    .att-name { font-weight: 500; display: flex; align-items: center; gap: 10px; }
    .att-name .idx { color: var(--text-3); font-size: .8rem; }

    .toggle-wrap { display: flex; align-items: center; gap: 12px; }
    .toggle-label {
      font-size: .8rem;
      font-weight: 600;
      min-width: 58px;
      text-align: right;
      letter-spacing: .01em;
    }
    .toggle-label.present-txt { color: var(--present); }
    .toggle-label.absent-txt  { color: var(--absent); }

    .toggle { position: relative; width: 52px; height: 28px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--absent);
      border-radius: 99px;
      cursor: pointer;
      transition: background .2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .slider { background: var(--present); }
    .toggle input:checked + .slider::before { transform: translateX(24px); }
    /* Focus visible en el toggle */
    .toggle input:focus-visible + .slider {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .bulk-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

    /* ── Reporte ────────────────────────────────────────── */
    .report-materia-header {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px 20px;
      margin-bottom: 20px;
    }
    .report-materia-name { font-size: 1.15rem; font-weight: 800; letter-spacing: -.02em; }
    .report-materia-sub  { font-size: .8rem; color: var(--text-2); margin-top: 2px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 18px;
      text-align: center;
    }
    .stat-val { font-size: 2rem; font-weight: 800; color: var(--accent); letter-spacing: -.04em; }
    .stat-lbl { font-size: .78rem; color: var(--text-2); margin-top: 4px; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    thead tr { background: var(--surface-2); }
    thead th {
      padding: 11px 14px;
      text-align: left;
      font-weight: 700;
      color: var(--text-2);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr:hover { background: rgba(60, 184, 120, .04); }
    tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); }
    .cell-present { color: var(--present); font-weight: 700; text-align: center; }
    .cell-absent  { color: var(--absent);  font-weight: 700; text-align: center; }
    .cell-pct     { font-weight: 700; text-align: center; }
    td.week-cell  { text-align: center; font-size: .8rem; }
    .dot-present  { color: var(--present); }
    .dot-absent   { color: var(--absent); }
    .dot-none     { color: var(--border); }

    .report-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    /* Override global select dentro de report-controls */
    #report-materia-picker { width: auto; font-weight: 600; cursor: pointer; }

    /* ── Disabled nav button ─────────────────────────────── */
    .btn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }

    /* ── No-class week ───────────────────────────────────── */
    .noclass-active { background: rgba(234,179,8,.15) !important; color: var(--warn) !important; border-color: rgba(234,179,8,.3) !important; }
    .dot-noclass { color: var(--text-3); font-size: .85rem; }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 640px) {
      header { flex-wrap: wrap; }
      .save-indicator { display: none; }
      .materia-bar { top: auto; position: relative; }
    }

    @media print {
      header, .materia-bar, .report-controls, .file-actions { display: none !important; }
      .view { display: block !important; }
      #view-alumnos, #view-asistencia { display: none !important; }
    }
  </style>
</head>
<body>

<!-- Enlace de salto para lectores de pantalla -->
<a class="skip-link" href="#main-content">Saltar al contenido principal</a>

<!-- Sprite SVG para iconos de la app -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true" focusable="false">
  <symbol id="ic-save" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
  </symbol>
  <symbol id="ic-export" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>

<!-- ===== HEADER ===== -->
<header aria-label="Cabecera de la aplicación">
  <a href="index.html" class="btn btn-ghost btn-sm" aria-label="Volver al inicio" title="Volver al inicio">← Inicio</a>
  <button id="theme-toggle" class="btn btn-ghost btn-sm" onclick="toggleTheme()" aria-label="Cambiar a modo claro" title="Cambiar a modo claro">
    <svg width="15" height="15" aria-hidden="true" focusable="false"><use href="#ic-sun"/></svg>
  </button>
  <h1>Control de <span>Asistencia</span></h1>

  <nav class="tabs" role="tablist" aria-label="Secciones">
    <button class="tab-btn active" role="tab" aria-selected="true"  aria-controls="view-alumnos"    id="tab-alumnos"    data-tab="alumnos"    onclick="switchTab('alumnos',this)">Alumnos</button>
    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="view-asistencia" id="tab-asistencia" data-tab="asistencia" onclick="switchTab('asistencia',this)">Asistencia</button>
    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="view-reporte"    id="tab-reporte"    data-tab="reporte"    onclick="switchTab('reporte',this)">Reporte</button>
  </nav>

  <div class="file-actions" role="group" aria-label="Guardar y exportar datos">
    <div class="save-status">
      <span id="save-indicator" aria-live="polite" aria-atomic="true">Guardado</span>
    </div>
    <button class="btn btn-save" onclick="saveLocally()" title="Guardar datos en este navegador">
      <svg width="15" height="15" aria-hidden="true" focusable="false"><use href="#ic-save"/></svg>
      Guardar
    </button>
    <button class="btn btn-ghost btn-sm" onclick="saveToFile()" title="Descargar copia de seguridad .json">
      <svg width="14" height="14" aria-hidden="true" focusable="false"><use href="#ic-export"/></svg>
      Exportar .json
    </button>
    <label class="btn btn-ghost btn-sm" style="cursor:pointer" title="Cargar desde un archivo .json guardado previamente">
      <svg width="14" height="14" aria-hidden="true" focusable="false"><use href="#ic-import"/></svg>
      Importar .json
      <input type="file" accept=".json" style="display:none" onchange="loadFromFile(this)" aria-label="Seleccionar archivo JSON para importar" />
    </label>
  </div>
</header>

<!-- ===== MATERIA BAR ===== -->
<div class="materia-bar" role="toolbar" aria-label="Selección de materia">
  <label class="materia-bar-label" for="materia-select">Materia</label>
  <select id="materia-select" onchange="switchMateria(this.value)" aria-label="Materia activa"></select>
  <div class="materia-actions">
    <button class="btn btn-primary btn-sm" onclick="promptNewMateria()">+ Nueva</button>
    <button class="btn btn-ghost   btn-sm" onclick="promptConfigMateria()">⚙ Configurar</button>
    <button class="btn btn-danger  btn-sm" onclick="promptDeleteMateria()">Eliminar</button>
  </div>
</div>

<main id="main-content">

  <!-- ============================  TAB 1 · ALUMNOS  ============================ -->
  <section id="view-alumnos" class="view active" role="tabpanel" aria-labelledby="tab-alumnos" tabindex="-1">
    <div class="section-header">
      <span class="section-title">Alumnos</span>
      <span id="count-badge" style="color:var(--text-muted);font-size:.875rem"></span>
    </div>

    <div class="card add-form" style="margin-bottom:20px">
      <input type="text" id="input-name" placeholder="Nombre del alumno…" onkeydown="if(event.key==='Enter') addStudent()" />
      <button class="btn btn-primary" onclick="addStudent()">+ Agregar</button>
    </div>

    <div id="student-list" class="student-list"></div>

    <div class="import-section card" style="margin-top:20px">
      <label>Importar lista (un nombre por línea)</label>
      <textarea id="bulk-input" placeholder="Juan García&#10;María López&#10;Carlos Martínez&#10;…"></textarea>
      <div style="display:flex;gap:10px;margin-top:10px">
        <button class="btn btn-ghost" onclick="importBulk()">Importar lista</button>
        <button class="btn btn-danger btn-sm" onclick="clearMateria()">Borrar alumnos de esta materia</button>
      </div>
    </div>
  </section>

  <!-- ============================  TAB 2 · ASISTENCIA  ============================ -->
  <section id="view-asistencia" class="view" role="tabpanel" aria-labelledby="tab-asistencia" tabindex="-1">
    <div class="week-nav">
      <button id="btn-week-prev" class="btn btn-ghost btn-sm" onclick="changeWeek(-1)">← Anterior</button>
      <div class="week-info">
        <div class="week-label" id="week-label">Semana —</div>
        <div class="week-date"  id="week-date-range">—</div>
        <div class="progress-bar-wrap" style="width:200px;margin:6px auto 0">
          <div class="progress-bar" id="week-progress" style="width:0%"></div>
        </div>
        <div class="week-stat" id="week-stat">0 / 0 presentes</div>
      </div>
      <button id="btn-week-next" class="btn btn-ghost btn-sm" onclick="changeWeek(1)">Siguiente →</button>
    </div>

    <div class="bulk-actions">
      <button class="btn btn-success btn-sm" onclick="markAll(true)">✓ Todos presentes</button>
      <button class="btn btn-danger  btn-sm" onclick="markAll(false)">✗ Todos ausentes</button>
      <button id="btn-noclass" class="btn btn-ghost btn-sm" onclick="toggleNoClass()" aria-pressed="false" title="Marcar/desmarcar esta semana como sin clases (no cuenta en el reporte)">Sin clases</button>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <label style="font-size:.8rem;color:var(--text-muted)">Ir a semana:</label>
        <input type="date" id="jump-date" style="width:160px" onchange="jumpToDate(this.value)" />
      </div>
    </div>

    <div id="attendance-grid" class="attendance-grid"></div>
  </section>

  <!-- ============================  TAB 3 · REPORTE  ============================ -->
  <section id="view-reporte" class="view" role="tabpanel" aria-labelledby="tab-reporte" tabindex="-1">

    <div class="report-controls">
      <label style="font-size:.8rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px">Ver reporte de:</label>
      <select id="report-materia-picker" onchange="refreshReport(this.value)"></select>
      <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost   btn-sm" onclick="refreshReport()">↻ Actualizar</button>
        <button class="btn btn-primary btn-sm" onclick="exportCSV()">↓ Exportar CSV</button>
        <button class="btn btn-ghost   btn-sm" onclick="exportPDF()">⎙ Guardar PDF</button>
      </div>
    </div>

    <div class="report-materia-header" id="report-header" style="display:none">
      <div>
        <div class="report-materia-name" id="report-materia-name">—</div>
        <div class="report-materia-sub"  id="report-materia-sub">—</div>
      </div>
    </div>

    <div class="stats-grid" id="stats-grid"></div>

    <div class="card">
      <div class="table-wrap">
        <table id="report-table">
          <thead id="report-thead"></thead>
          <tbody id="report-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>

</main>

<div id="toast"></div>

<!-- Modal configuración de materia -->
<div class="modal-backdrop" id="modal-materia-cfg">
  <div class="modal" style="max-width:520px">
    <h2 id="matcfg-title">Configurar materia</h2>
    <p  id="matcfg-body" style="color:var(--text-2);font-size:.875rem;margin-bottom:16px"></p>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label style="display:block;font-size:.78rem;font-weight:700;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em">Nombre</label>
        <input type="text" id="matcfg-name" placeholder="Ej: Matemáticas, Historia…" />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label style="display:block;font-size:.78rem;font-weight:700;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em">Fecha de inicio</label>
          <input type="date" id="matcfg-start" />
        </div>
        <div>
          <label style="display:block;font-size:.78rem;font-weight:700;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em">Duración (semanas)</label>
          <input type="number" id="matcfg-weeks" min="1" max="52" value="16" />
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label style="display:block;font-size:.78rem;font-weight:700;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em">Sesiones / semana</label>
          <input type="number" id="matcfg-spw" min="1" max="7" value="2" />
        </div>
        <div>
          <label style="display:block;font-size:.78rem;font-weight:700;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em">% máx. de faltas</label>
          <input type="number" id="matcfg-loss" min="1" max="99" value="25" />
        </div>
      </div>
      <div id="matcfg-summary" style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;font-size:.82rem;color:var(--text-2);line-height:1.7"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeMateriaModal()">Cancelar</button>
      <button class="btn btn-primary" id="matcfg-confirm">Crear</button>
    </div>
  </div>
</div>

<!-- Modal genérico -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2 id="modal-title">—</h2>
    <p  id="modal-body">—</p>
    <input type="text" id="modal-input" placeholder="" style="display:none" />
    <div class="modal-footer">
      <button class="btn btn-ghost"  onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" id="modal-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script>
// ===================================================
//  ESTADO
// ===================================================
const STORAGE_KEY = 'attendance_app_v2';

let state = {
  materias: [],          // [{ id, name, students:[], weeks:{}, noClassWeeks:{}, startDate, totalWeeks, sessionsPerWeek, lossPercent }]
  currentMateriaId: null,
  currentWeekKey: null
};

// ===================================================
//  HELPERS DE MATERIA
// ===================================================
function generateId() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function currentMateria() {
  return state.materias.find(m => m.id === state.currentMateriaId) || state.materias[0];
}

function getMateriaById(id) {
  return state.materias.find(m => m.id === id);
}

// ===================================================
//  PERSISTENCIA
// ===================================================
let isDirty = false;

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  markDirty();
}

function load() {
  try {
    // Intentar v2
    let raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      // Migrar desde v1 si existe
      const v1 = localStorage.getItem('attendance_app_v1');
      if (v1) {
        const old = JSON.parse(v1);
        const id = generateId();
        state = {
          materias: [{
            id,
            name: 'General',
            students: old.students || [],
            weeks: old.weeks || {}
          }],
          currentMateriaId: id,
          currentWeekKey: old.currentWeekKey || getWeekKey(new Date())
        };
        save();
        toast('Datos migrados a formato v2');
        return;
      }
    }
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.materias) state = parsed;
    }
  } catch(e) {}

  // Asegurar al menos una materia
  if (!state.materias || !state.materias.length) {
    const id = generateId();
    state.materias = [{ id, name: 'General', students: [], weeks: {} }];
    state.currentMateriaId = id;
  }
  if (!state.currentMateriaId) state.currentMateriaId = state.materias[0].id;
  if (!state.currentWeekKey)  state.currentWeekKey  = getWeekKey(new Date());
  // Normalize fields added in later versions
  state.materias.forEach(m => { if (!m.noClassWeeks) m.noClassWeeks = {}; });
}

// ===================================================
//  SEMANAS
// ===================================================
function getWeekKey(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}

function weekKeyToMonday(wk) {
  const [year, w] = wk.split('-W').map(Number);
  const jan4    = new Date(Date.UTC(year, 0, 4));
  const monday  = new Date(jan4);
  monday.setUTCDate(jan4.getUTCDate() - (jan4.getUTCDay() || 7) + 1 + (w - 1) * 7);
  return monday;
}

function formatDate(d) {
  return d.toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric', timeZone:'UTC' });
}

function changeWeek(delta) {
  const monday = weekKeyToMonday(state.currentWeekKey);
  monday.setUTCDate(monday.getUTCDate() + delta * 7);
  monday.setUTCHours(12);
  const newKey = getWeekKey(monday);
  if (newKey > getWeekKey(new Date())) return; // no ir a semanas futuras
  state.currentWeekKey = newKey;
  save();
  renderAttendance();
}

function jumpToDate(val) {
  if (!val) return;
  const newKey = getWeekKey(new Date(val + 'T12:00:00'));
  if (newKey > getWeekKey(new Date())) { toast('No puedes ir a semanas futuras'); return; }
  state.currentWeekKey = newKey;
  save();
  renderAttendance();
}

// ===================================================
//  MATERIA BAR
// ===================================================
function renderMateriaBar() {
  const sel = document.getElementById('materia-select');
  sel.innerHTML = state.materias.map(m =>
    `<option value="${m.id}" ${m.id === state.currentMateriaId ? 'selected' : ''}>${escHtml(m.name)}</option>`
  ).join('');
}

function switchMateria(id) {
  state.currentMateriaId = id;
  save();
  renderCurrentTab();
}

function promptNewMateria() {
  openMateriaModal({
    title: 'Nueva materia',
    confirmLabel: 'Crear materia',
    onConfirm: (cfg) => {
      if (state.materias.find(m => m.name === cfg.name)) { toast('Ya existe esa materia'); return; }
      const id = generateId();
      state.materias.push({ id, students: [], weeks: {}, noClassWeeks: {}, ...cfg });
      state.currentMateriaId = id;
      if (cfg.startDate) state.currentWeekKey = getWeekKey(new Date(cfg.startDate + 'T12:00:00'));
      save();
      renderMateriaBar();
      renderCurrentTab();
      toast(`Materia "${cfg.name}" creada`);
    }
  });
}

function promptConfigMateria() {
  const m = currentMateria();
  openMateriaModal({
    title: `Configurar "${m.name}"`,
    confirmLabel: 'Guardar cambios',
    materia: m,
    onConfirm: (cfg) => {
      const dup = state.materias.find(x => x.name === cfg.name && x.id !== m.id);
      if (dup) { toast('Ya existe una materia con ese nombre'); return; }
      Object.assign(m, cfg);
      save();
      renderMateriaBar();
      renderCurrentTab();
      toast('Configuración guardada');
    }
  });
}

function promptRenameMateria() {
  const m = currentMateria();
  openModal({
    title: 'Renombrar materia',
    body: `Nombre actual: "${m.name}"`,
    input: true,
    placeholder: 'Nuevo nombre…',
    initialValue: m.name,
    confirmLabel: 'Guardar',
    confirmClass: 'btn-primary',
    onConfirm: (name) => {
      name = name.trim();
      if (!name) { toast('El nombre no puede estar vacío'); return; }
      m.name = name;
      save();
      renderMateriaBar();
      renderCurrentTab();
      toast(`Renombrada a "${name}"`);
    }
  });
}

function promptDeleteMateria() {
  if (state.materias.length <= 1) { toast('Debes tener al menos una materia'); return; }
  const m = currentMateria();
  openModal({
    title: `¿Eliminar "${m.name}"?`,
    body: 'Se perderán todos los alumnos y registros de asistencia de esta materia.',
    confirmLabel: 'Eliminar',
    confirmClass: 'btn-danger',
    onConfirm: () => {
      state.materias = state.materias.filter(x => x.id !== m.id);
      state.currentMateriaId = state.materias[0].id;
      save();
      renderMateriaBar();
      renderCurrentTab();
      toast(`Materia "${m.name}" eliminada`);
    }
  });
}

// ===================================================
//  MODAL CONFIGURACIÓN DE MATERIA
// ===================================================
let _materiaModalCb = null;

function openMateriaModal({ title, confirmLabel, materia, onConfirm }) {
  document.getElementById('matcfg-title').textContent = title;
  document.getElementById('matcfg-confirm').textContent = confirmLabel || 'Guardar';

  document.getElementById('matcfg-name').value  = materia?.name  || '';
  document.getElementById('matcfg-start').value = materia?.startDate || new Date().toISOString().slice(0, 10);
  document.getElementById('matcfg-weeks').value = materia?.totalWeeks      ?? 16;
  document.getElementById('matcfg-spw').value   = materia?.sessionsPerWeek ?? 2;
  document.getElementById('matcfg-loss').value  = materia?.lossPercent     ?? 25;

  updateMatcfgSummary();
  document.getElementById('modal-materia-cfg').classList.add('open');
  setTimeout(() => document.getElementById('matcfg-name').focus(), 50);
  _materiaModalCb = onConfirm;
}

function closeMateriaModal() {
  document.getElementById('modal-materia-cfg').classList.remove('open');
  _materiaModalCb = null;
}

function updateMatcfgSummary() {
  const weeks = parseInt(document.getElementById('matcfg-weeks').value) || 0;
  const spw   = parseInt(document.getElementById('matcfg-spw').value)   || 1;
  const loss  = parseFloat(document.getElementById('matcfg-loss').value) || 25;
  const total  = weeks * spw;
  const maxAbs = total ? Math.floor(total * loss / 100) : 0;
  const el = document.getElementById('matcfg-summary');
  if (total > 0) {
    el.innerHTML = `<strong>${total}</strong> sesiones totales &nbsp;·&nbsp; se pierde con <strong style="color:var(--absent)">${maxAbs}</strong> faltas o más (${loss}% de ${total})`;
  } else {
    el.textContent = 'Completa los campos para ver el resumen.';
  }
}

// ===================================================
//  TABS
// ===================================================
let currentTab = 'alumnos';

function switchTab(tab, btn) {
  // Actualizar panels
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${tab}`).classList.add('active');

  // Actualizar tabs (clase + aria-selected)
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-selected', 'false');
  });
  const activeBtn = btn || document.querySelector(`[data-tab="${tab}"]`);
  if (activeBtn) {
    activeBtn.classList.add('active');
    activeBtn.setAttribute('aria-selected', 'true');
  }

  currentTab = tab;
  renderCurrentTab();
}

function renderCurrentTab() {
  if (currentTab === 'alumnos')    renderStudents();
  if (currentTab === 'asistencia') renderAttendance();
  if (currentTab === 'reporte')    refreshReport();
}

// ===================================================
//  ALUMNOS
// ===================================================
function renderStudents() {
  const m    = currentMateria();
  const list = document.getElementById('student-list');
  const cnt  = document.getElementById('count-badge');
  cnt.textContent = `${m.students.length} alumno${m.students.length !== 1 ? 's' : ''} · ${m.name}`;

  if (!m.students.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">👥</div><p>Agrega alumnos a <strong>${escHtml(m.name)}</strong>.</p></div>`;
    return;
  }
  list.innerHTML = m.students.map((name, i) => `
    <div class="student-item">
      <span><span class="student-num">${i + 1}</span>${escHtml(name)}</span>
      <button class="btn btn-danger btn-sm" onclick="removeStudent(${i})">✕</button>
    </div>
  `).join('');
}

function addStudent() {
  const m     = currentMateria();
  const input = document.getElementById('input-name');
  const name  = input.value.trim();
  if (!name) return;
  if (m.students.includes(name)) { toast('Ya existe ese alumno'); return; }
  m.students.push(name);
  save();
  renderStudents();
  input.value = '';
  input.focus();
}

function removeStudent(idx) {
  const m    = currentMateria();
  const name = m.students[idx];
  openModal({
    title: `¿Eliminar a "${name}"?`,
    body: 'Se perderán sus registros de asistencia en esta materia.',
    confirmLabel: 'Eliminar',
    confirmClass: 'btn-danger',
    onConfirm: () => {
      m.students.splice(idx, 1);
      Object.keys(m.weeks).forEach(wk => { delete m.weeks[wk][name]; });
      save();
      renderStudents();
      toast(`"${name}" eliminado`);
    }
  });
}

function importBulk() {
  const m     = currentMateria();
  const raw   = document.getElementById('bulk-input').value;
  const names = raw.split('\n').map(s => s.trim()).filter(Boolean);
  if (!names.length) { toast('No hay nombres para importar'); return; }
  let added = 0;
  names.forEach(name => {
    if (!m.students.includes(name)) { m.students.push(name); added++; }
  });
  save();
  renderStudents();
  document.getElementById('bulk-input').value = '';
  toast(`${added} alumno${added !== 1 ? 's' : ''} importado${added !== 1 ? 's' : ''} en ${m.name}`);
}

function clearMateria() {
  const m = currentMateria();
  openModal({
    title: `¿Borrar alumnos de "${m.name}"?`,
    body: 'Se eliminarán todos los alumnos y registros de asistencia de esta materia.',
    confirmLabel: 'Borrar',
    confirmClass: 'btn-danger',
    onConfirm: () => {
      m.students     = [];
      m.weeks        = {};
      m.noClassWeeks = {};
      save();
      renderStudents();
      toast('Alumnos borrados');
    }
  });
}

// ===================================================
//  ASISTENCIA
// ===================================================
function ensureWeek(m, wk) {
  if (!m.weeks[wk]) m.weeks[wk] = {};
  m.students.forEach(name => {
    if (m.weeks[wk][name] === undefined) m.weeks[wk][name] = false;
  });
}

function renderAttendance() {
  const m  = currentMateria();
  const wk = state.currentWeekKey;

  const monday = weekKeyToMonday(wk);
  const friday = new Date(monday);
  friday.setUTCDate(monday.getUTCDate() + 4);

  document.getElementById('week-label').textContent      = `Semana ${wk}`;
  document.getElementById('week-date-range').textContent = `${formatDate(monday)} — ${formatDate(friday)}`;

  // Disable "Siguiente" if already at current week
  const nextBtn = document.getElementById('btn-week-next');
  if (nextBtn) nextBtn.disabled = wk >= getWeekKey(new Date());

  // Update "Sin clases" button state
  const isNoClass  = !!(m.noClassWeeks?.[wk]);
  const noclassBtn = document.getElementById('btn-noclass');
  if (noclassBtn) {
    noclassBtn.classList.toggle('noclass-active', isNoClass);
    noclassBtn.setAttribute('aria-pressed', String(isNoClass));
  }

  const grid = document.getElementById('attendance-grid');

  if (isNoClass) {
    document.getElementById('week-progress').style.width = '0%';
    document.getElementById('week-stat').textContent     = `Sin clases · ${m.name}`;
    grid.innerHTML = `
      <div class="empty-state" style="padding:40px 20px">
        <p style="font-size:1rem;font-weight:600;margin-bottom:6px">Sin clases esta semana</p>
        <p style="font-size:.875rem;color:var(--text-2)">Esta semana no cuenta en el reporte ni en los cálculos de asistencia.</p>
        <button class="btn btn-ghost btn-sm" style="margin-top:16px" onclick="toggleNoClass()">Desmarcar</button>
      </div>`;
    return;
  }

  ensureWeek(m, wk);

  const record  = m.weeks[wk];
  const total   = m.students.length;
  const present = m.students.filter(n => record[n]).length;
  const pct     = total ? Math.round(present / total * 100) : 0;

  document.getElementById('week-progress').style.width = pct + '%';
  document.getElementById('week-stat').textContent     = `${present} / ${total} presentes (${pct}%) · ${m.name}`;

  if (!m.students.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>Agrega alumnos en la pestaña <strong>Alumnos</strong>.</p></div>`;
    return;
  }

  grid.innerHTML = m.students.map((name, i) => {
    const isPresent = record[name];
    const checked   = isPresent ? 'checked' : '';
    const rowClass  = isPresent ? 'present' : 'absent';
    const lblClass  = isPresent ? 'present-txt' : 'absent-txt';
    const lblText   = isPresent ? 'Presente' : 'Ausente';
    return `
      <div class="att-row ${rowClass}" id="row-${i}">
        <div class="att-name"><span class="idx" aria-hidden="true">${i + 1}</span>${escHtml(name)}</div>
        <div class="toggle-wrap">
          <span class="toggle-label ${lblClass}" id="lbl-${i}" aria-hidden="true">${lblText}</span>
          <label class="toggle" aria-label="${escHtml(name)} — marcar asistencia">
            <input
              type="checkbox"
              ${checked}
              aria-label="${escHtml(name)}: ${lblText}"
              aria-describedby="lbl-${i}"
              onchange="toggleAttendance(${i}, this.checked)"
            />
            <span class="slider"></span>
          </label>
        </div>
      </div>`;
  }).join('');
}

function toggleAttendance(idx, val) {
  const m    = currentMateria();
  const wk   = state.currentWeekKey;
  const name = m.students[idx];
  m.weeks[wk][name] = val;
  save();

  const statusText = val ? 'Presente' : 'Ausente';
  document.getElementById(`row-${idx}`).className = `att-row ${val ? 'present' : 'absent'}`;
  const lbl = document.getElementById(`lbl-${idx}`);
  lbl.className   = `toggle-label ${val ? 'present-txt' : 'absent-txt'}`;
  lbl.textContent = statusText;
  // Actualizar aria-label del checkbox para lectores de pantalla
  const chk = document.querySelector(`#row-${idx} input[type="checkbox"]`);
  if (chk) chk.setAttribute('aria-label', `${name}: ${statusText}`);

  const record  = m.weeks[wk];
  const total   = m.students.length;
  const present = m.students.filter(n => record[n]).length;
  const pct     = total ? Math.round(present / total * 100) : 0;
  document.getElementById('week-progress').style.width = pct + '%';
  document.getElementById('week-stat').textContent     = `${present} / ${total} presentes (${pct}%) · ${m.name}`;
}

function toggleNoClass() {
  const m  = currentMateria();
  const wk = state.currentWeekKey;
  if (!m.noClassWeeks) m.noClassWeeks = {};
  if (m.noClassWeeks[wk]) { delete m.noClassWeeks[wk]; }
  else                     { m.noClassWeeks[wk] = true; }
  save();
  renderAttendance();
}

function markAll(val) {
  const m  = currentMateria();
  const wk = state.currentWeekKey;
  ensureWeek(m, wk);
  m.students.forEach(name => { m.weeks[wk][name] = val; });
  save();
  renderAttendance();
}

// ===================================================
//  REPORTE
// ===================================================
function renderReportPicker() {
  const picker = document.getElementById('report-materia-picker');
  const cur    = picker.value || state.currentMateriaId;
  picker.innerHTML = state.materias.map(m =>
    `<option value="${m.id}" ${m.id === cur ? 'selected' : ''}>${escHtml(m.name)}</option>`
  ).join('');
}

function refreshReport(materiaId) {
  renderReportPicker();

  const picker = document.getElementById('report-materia-picker');
  const id     = materiaId || picker.value || state.currentMateriaId;
  picker.value = id;

  const m     = getMateriaById(id) || currentMateria();
  const studs = m.students;

  // Course config
  const spw        = m.sessionsPerWeek || 1;
  const totalSess  = (m.totalWeeks || 0) * spw;
  const lossThresh = totalSess ? Math.floor(totalSess * ((m.lossPercent ?? 25) / 100)) : null;
  const hasCfg     = !!m.totalWeeks;

  // Filter recorded weeks by configured date range
  let weeks = Object.keys(m.weeks).sort();
  if (m.startDate && m.totalWeeks) {
    const startWk = getWeekKey(new Date(m.startDate + 'T12:00:00'));
    const endMon  = new Date(m.startDate + 'T12:00:00');
    endMon.setUTCDate(endMon.getUTCDate() + (m.totalWeeks - 1) * 7);
    const endWk   = getWeekKey(endMon);
    weeks = weeks.filter(wk => wk >= startWk && wk <= endWk);
  }
  const noClassWks = m.noClassWeeks || {};

  // Report header
  const rHeader = document.getElementById('report-header');
  rHeader.style.display = 'flex';
  document.getElementById('report-materia-name').textContent = m.name;
  const subParts = [
    `${studs.length} alumno${studs.length !== 1 ? 's' : ''}`,
    `${weeks.length} semana${weeks.length !== 1 ? 's' : ''} registrada${weeks.length !== 1 ? 's' : ''}`
  ];
  if (hasCfg) {
    if (m.startDate) {
      const startLbl = new Date(m.startDate + 'T12:00:00').toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' });
      subParts.push(`inicio: ${startLbl}`);
    }
    subParts.push(`${m.totalWeeks} sem · ${spw} ses/sem · máx. ${m.lossPercent ?? 25}% faltas (${lossThresh} ses.)`);
  }
  document.getElementById('report-materia-sub').textContent = subParts.join(' · ');

  // Per-student tallies for global stats (skip noClass weeks)
  let totalP = 0, totalPos = 0, atRiskCount = 0, lostCount = 0;
  studs.forEach(name => {
    let p = 0, a = 0;
    weeks.forEach(wk => {
      if (noClassWks[wk]) return;
      const val = m.weeks[wk]?.[name];
      if (val === true)  { p++; totalP++; }
      if (val !== undefined) totalPos++;
      if (val === false) a++;
    });
    if (hasCfg && lossThresh !== null) {
      const absSess = a * spw;
      if (absSess >= lossThresh)                         lostCount++;
      else if (absSess >= Math.floor(lossThresh * 0.75)) atRiskCount++;
    }
  });
  const globalPct = totalPos ? Math.round(totalP / totalPos * 100) : 0;

  let statsHtml = `
    <div class="stat-card"><div class="stat-val">${studs.length}</div><div class="stat-lbl">Alumnos</div></div>
    <div class="stat-card"><div class="stat-val">${weeks.length}</div><div class="stat-lbl">Semanas</div></div>
    <div class="stat-card"><div class="stat-val">${globalPct}%</div><div class="stat-lbl">Asistencia global</div></div>`;
  if (hasCfg) {
    statsHtml += `
    <div class="stat-card"><div class="stat-val">${totalSess}</div><div class="stat-lbl">Sesiones totales</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--warn)">${atRiskCount}</div><div class="stat-lbl">En riesgo</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--absent)">${lostCount}</div><div class="stat-lbl">Perdida</div></div>`;
  } else {
    statsHtml += `
    <div class="stat-card"><div class="stat-val">${totalP}</div><div class="stat-lbl">Total presencias</div></div>`;
  }
  document.getElementById('stats-grid').innerHTML = statsHtml;

  if (!studs.length || !weeks.length) {
    document.getElementById('report-thead').innerHTML = '';
    document.getElementById('report-tbody').innerHTML =
      `<tr><td colspan="10"><div class="empty-state"><div class="icon">📊</div><p>No hay datos en <strong>${escHtml(m.name)}</strong>.</p></div></td></tr>`;
    return;
  }

  // Attendance % threshold based on configured lossPercent
  const passThresh = hasCfg ? (100 - (m.lossPercent ?? 25)) : 80;

  document.getElementById('report-thead').innerHTML = `
    <tr>
      <th>#</th>
      <th>Alumno</th>
      ${weeks.map(wk => `<th title="${wk}${noClassWks[wk] ? ' · Sin clases' : ''}" ${noClassWks[wk] ? 'style="color:var(--text-3)"' : ''}>${shortWeekLabel(wk)}</th>`).join('')}
      <th>${hasCfg && spw > 1 ? 'Ses. presentes' : 'Presentes'}</th>
      <th>${hasCfg && spw > 1 ? 'Ses. ausentes'  : 'Ausentes'}</th>
      <th>% Asistencia</th>
      ${hasCfg ? '<th>Estado</th>' : ''}
    </tr>`;

  document.getElementById('report-tbody').innerHTML = studs.map((name, i) => {
    let p = 0, a = 0;
    const cells = weeks.map(wk => {
      if (noClassWks[wk]) return `<td class="week-cell"><span class="dot-noclass" title="Sin clases">—</span></td>`;
      const val = m.weeks[wk]?.[name];
      if (val === true)  { p++; return `<td class="week-cell"><span class="dot-present">●</span></td>`; }
      if (val === false) { a++; return `<td class="week-cell"><span class="dot-absent">●</span></td>`; }
      return `<td class="week-cell"><span class="dot-none">○</span></td>`;
    }).join('');

    const total = p + a;
    const pct   = total ? Math.round(p / total * 100) : 0;
    const badge = pct >= passThresh
      ? 'badge-green'
      : pct >= passThresh * 0.85
        ? 'badge-yellow'
        : 'badge-red';

    let estadoCell = '';
    if (hasCfg && lossThresh !== null) {
      const absSess   = a * spw;
      const remaining = lossThresh - absSess;
      if (absSess >= lossThresh) {
        estadoCell = `<td><span class="badge badge-red">Perdida</span></td>`;
      } else if (absSess >= Math.floor(lossThresh * 0.75)) {
        estadoCell = `<td><span class="badge badge-yellow" title="Faltan ${remaining} faltas para perder">En riesgo</span></td>`;
      } else {
        estadoCell = `<td><span class="badge badge-green" title="Puede faltar ${remaining} sesiones más">OK</span></td>`;
      }
    }

    return `
      <tr>
        <td style="color:var(--text-muted);font-size:.8rem">${i + 1}</td>
        <td><strong>${escHtml(name)}</strong></td>
        ${cells}
        <td class="cell-present">${p * spw}</td>
        <td class="cell-absent">${a * spw}</td>
        <td class="cell-pct"><span class="badge ${badge}">${pct}%</span></td>
        ${estadoCell}
      </tr>`;
  }).join('');
}

function shortWeekLabel(wk) {
  return weekKeyToMonday(wk).toLocaleDateString('es-MX', { day:'2-digit', month:'short', timeZone:'UTC' });
}

// ===================================================
//  GUARDAR / CARGAR
// ===================================================
function _timeNow() {
  return new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
}

function markDirty() {
  isDirty = true;
  // Los datos siguen guardados en localStorage (auto-save),
  // pero aún no se han exportado a archivo .json
  const el = document.getElementById('save-indicator');
  const wrap = el?.closest('.save-status');
  if (!el) return;
  el.textContent = 'Sin exportar';
  wrap?.classList.add('dirty');
}

function markClean(label) {
  isDirty = false;
  const el = document.getElementById('save-indicator');
  const wrap = el?.closest('.save-status');
  if (!el) return;
  el.textContent = label || 'Guardado';
  wrap?.classList.remove('dirty');
}

// Guardado explícito en localStorage con confirmación visual
function saveLocally() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const time = _timeNow();
  markClean(`Guardado · ${time}`);
  toast(`Guardado en el navegador · ${time}`);
}

// Exportar a archivo .json
function saveToFile() {
  const dateStr = new Date().toISOString().slice(0, 10);
  const filename = `asistencia_${dateStr}.json`;
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  markClean(`Exportado · ${filename}`);
  toast(`Archivo guardado: ${filename}`);
}

function loadFromFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      // Validar formato v2
      if (!Array.isArray(parsed.materias)) {
        // Intentar migrar desde v1
        if (Array.isArray(parsed.students)) {
          const id = generateId();
          state = {
            materias: [{ id, name: 'General', students: parsed.students, weeks: parsed.weeks || {} }],
            currentMateriaId: id,
            currentWeekKey: parsed.currentWeekKey || getWeekKey(new Date())
          };
        } else {
          toast('Archivo inválido'); return;
        }
      } else {
        state = parsed;
      }
      if (!state.currentWeekKey) state.currentWeekKey = getWeekKey(new Date());
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderMateriaBar();
      renderCurrentTab();
      markClean(file.name);
      toast(`Datos cargados desde "${file.name}"`);
    } catch(err) {
      toast('Error al leer el archivo JSON');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

// ===================================================
//  EXPORTAR PDF
// ===================================================
function exportPDF() {
  const picker = document.getElementById('report-materia-picker');
  const m      = getMateriaById(picker.value) || currentMateria();
  const studs  = m.students;

  const spw        = m.sessionsPerWeek || 1;
  const totalSess  = (m.totalWeeks || 0) * spw;
  const lossThresh = totalSess ? Math.floor(totalSess * ((m.lossPercent ?? 25) / 100)) : null;
  const hasCfg     = !!m.totalWeeks;
  const noClassWks = m.noClassWeeks || {};
  const passThresh = hasCfg ? (100 - (m.lossPercent ?? 25)) : 80;

  // Same week filter as report
  let weeks = Object.keys(m.weeks).sort();
  if (m.startDate && m.totalWeeks) {
    const startWk = getWeekKey(new Date(m.startDate + 'T12:00:00'));
    const endMon  = new Date(m.startDate + 'T12:00:00');
    endMon.setUTCDate(endMon.getUTCDate() + (m.totalWeeks - 1) * 7);
    weeks = weeks.filter(wk => wk >= startWk && wk <= getWeekKey(endMon));
  }

  if (!studs.length || !weeks.length) { toast('No hay datos para el PDF'); return; }

  // Pre-compute totals per student (using all active weeks)
  const totals = studs.map(name => {
    let p = 0, a = 0;
    weeks.forEach(wk => {
      if (noClassWks[wk]) return;
      const v = m.weeks[wk]?.[name];
      if (v === true)  p++;
      if (v === false) a++;
    });
    return { p, a };
  });

  // Course info line
  const courseLineParts = [];
  if (m.startDate) {
    const sd = new Date(m.startDate + 'T12:00:00');
    courseLineParts.push('Inicio: ' + sd.toLocaleDateString('es-MX', { day:'2-digit', month:'long', year:'numeric', timeZone:'UTC' }));
  }
  if (m.totalWeeks) courseLineParts.push(m.totalWeeks + ' semanas');
  if (spw > 1) courseLineParts.push(spw + ' ses/sem');
  if (totalSess) courseLineParts.push(totalSess + ' sesiones totales');
  if (lossThresh) courseLineParts.push('Máx. faltas: ' + lossThresh + ' ses.');
  const courseInfo = courseLineParts.join('  ·  ');

  // Chunk weeks — 10 per page in landscape
  const CHUNK = 10;
  const chunks = [];
  for (let i = 0; i < weeks.length; i += CHUNK) chunks.push(weeks.slice(i, i + CHUNK));

  const totalPages = chunks.length;

  const pagesHtml = chunks.map((chunkWks, ci) => {
    const isLast = ci === chunks.length - 1;

    const thead = `<tr>
      <th class="th-num">#</th>
      <th class="th-name">Alumno</th>
      ${chunkWks.map(wk => `<th class="${noClassWks[wk] ? 'th-nc' : 'th-wk'}">${shortWeekLabel(wk)}${noClassWks[wk] ? '<br><span class="nc-label">NC</span>' : ''}</th>`).join('')}
      ${isLast ? `<th class="th-stat">Ses.P</th><th class="th-stat">Ses.A</th><th class="th-pct">%</th>${hasCfg ? '<th class="th-estado">Estado</th>' : ''}` : '<th class="th-cont">···</th>'}
    </tr>`;

    const tbody = studs.map((name, i) => {
      const { p, a } = totals[i];
      const tot = p + a;
      const pct = tot ? Math.round(p / tot * 100) : 0;
      const pctCls = pct >= passThresh ? 'ok' : pct >= passThresh * 0.85 ? 'risk' : 'lost';

      let estadoText = '', estadoCls = '';
      if (hasCfg && lossThresh !== null) {
        const absSess = a * spw;
        if (absSess >= lossThresh)                         { estadoText = 'Perdida';    estadoCls = 'lost'; }
        else if (absSess >= Math.floor(lossThresh * 0.75)) { estadoText = 'En riesgo';  estadoCls = 'risk'; }
        else                                               { estadoText = 'OK';          estadoCls = 'ok';   }
      }

      const cells = chunkWks.map(wk => {
        if (noClassWks[wk]) return '<td class="c-nc">—</td>';
        const v = m.weeks[wk]?.[name];
        if (v === true)  return '<td class="c-p">P</td>';
        if (v === false) return '<td class="c-a">A</td>';
        return '<td class="c-none">·</td>';
      }).join('');

      const statsCells = isLast
        ? `<td class="c-stat">${p * spw}</td><td class="c-stat">${a * spw}</td><td class="c-pct ${pctCls}">${pct}%</td>${hasCfg ? `<td class="c-estado ${estadoCls}">${estadoText}</td>` : ''}`
        : '<td class="c-cont">···</td>';

      return `<tr><td class="c-num">${i + 1}</td><td class="c-name">${escHtml(name)}</td>${cells}${statsCells}</tr>`;
    }).join('');

    return `
    <div class="page">
      <div class="page-head">
        <div class="page-head-left">
          <div class="mat-title">${escHtml(m.name)}</div>
          ${courseInfo ? `<div class="mat-info">${courseInfo}</div>` : ''}
        </div>
        <div class="page-num">Pág. ${ci + 1} / ${totalPages}</div>
      </div>
      <table><thead>${thead}</thead><tbody>${tbody}</tbody></table>
    </div>`;
  }).join('');

  const html = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Reporte · ${escHtml(m.name)}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  @page{size:landscape;margin:10mm 12mm}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:10.5px;color:#111;background:#fff}
  .page{width:100%;padding:0 0 12px;page-break-after:always}
  .page:last-child{page-break-after:avoid}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #111;padding-bottom:7px;margin-bottom:10px}
  .mat-title{font-size:17px;font-weight:800;letter-spacing:-.5px}
  .mat-info{font-size:9px;color:#555;margin-top:3px}
  .page-num{font-size:9px;color:#888;white-space:nowrap}
  table{width:100%;border-collapse:collapse}
  th,td{border:1px solid #d8d8d8;padding:3px 4px;text-align:center;vertical-align:middle;white-space:nowrap}
  th{background:#f2f2f2;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .th-name,.c-name{text-align:left;min-width:120px;max-width:170px;font-weight:600;overflow:hidden;text-overflow:ellipsis}
  .th-num,.c-num{width:22px;color:#999;font-size:9px}
  .th-wk{width:42px}.th-nc{width:42px;color:#bbb;background:#f9f9f9}
  .th-stat{width:38px}.th-pct{width:34px}.th-estado{width:58px}.th-cont{width:24px;color:#ccc}
  .c-p{color:#16a34a;font-weight:700;background:rgba(22,163,74,.07)}
  .c-a{color:#dc2626;font-weight:700;background:rgba(220,38,38,.07)}
  .c-nc{color:#bbb}.c-none{color:#d0d0d0}.c-cont{color:#ccc}
  .c-stat{font-weight:700}.c-pct{font-weight:800}
  .nc-label{font-size:7px;display:block;letter-spacing:.03em}
  .ok{color:#16a34a}.risk{color:#b45309}.lost{color:#dc2626}
  tbody tr:nth-child(even){background:#fafafa}
  @media print{
    body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .page{padding:0 0 8px}
  }
</style>
</head>
<body>
${pagesHtml}
<script>window.onload=()=>window.print()<\/script>
</body>
</html>`;

  const win = window.open('', '_blank', 'width=1100,height=750');
  if (!win) { toast('Permite ventanas emergentes para guardar el PDF'); return; }
  win.document.write(html);
  win.document.close();
}

// ===================================================
//  EXPORTAR CSV
// ===================================================
function exportCSV() {
  const picker = document.getElementById('report-materia-picker');
  const m      = getMateriaById(picker.value) || currentMateria();

  if (!m.students.length || !Object.keys(m.weeks).length) { toast('No hay datos para exportar'); return; }

  const spw        = m.sessionsPerWeek || 1;
  const totalSess  = (m.totalWeeks || 0) * spw;
  const lossThresh = totalSess ? Math.floor(totalSess * ((m.lossPercent ?? 25) / 100)) : null;
  const hasCfg     = !!m.totalWeeks;
  const noClassWks = m.noClassWeeks || {};

  // Same date-range filter as report
  let weeks = Object.keys(m.weeks).sort();
  if (m.startDate && m.totalWeeks) {
    const startWk = getWeekKey(new Date(m.startDate + 'T12:00:00'));
    const endMon  = new Date(m.startDate + 'T12:00:00');
    endMon.setUTCDate(endMon.getUTCDate() + (m.totalWeeks - 1) * 7);
    weeks = weeks.filter(wk => wk >= startWk && wk <= getWeekKey(endMon));
  }

  const header = ['Alumno', ...weeks.map(wk => `${wk} (${shortWeekLabel(wk)})${noClassWks[wk] ? ' NC' : ''}`), 'Ses. presentes', 'Ses. ausentes', '% Asistencia', ...(hasCfg ? ['Estado'] : [])];
  const rows = m.students.map(name => {
    let p = 0, a = 0;
    const cells = weeks.map(wk => {
      if (noClassWks[wk]) return 'NC';
      const v = m.weeks[wk]?.[name];
      if (v === true)  { p++; return 'P'; }
      if (v === false) { a++; return 'A'; }
      return '-';
    });
    const total = p + a;
    let estado = '';
    if (hasCfg && lossThresh !== null) {
      const absSess = a * spw;
      estado = absSess >= lossThresh ? 'Perdida' : absSess >= Math.floor(lossThresh * 0.75) ? 'En riesgo' : 'OK';
    }
    return [name, ...cells, p * spw, a * spw, `${total ? Math.round(p/total*100) : 0}%`, ...(hasCfg ? [estado] : [])];
  });

  const csv  = [header, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `asistencia_${m.name.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`CSV exportado: ${m.name}`);
}

// ===================================================
//  HELPERS
// ===================================================
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// Modal genérico
let _modalConfirmCb = null;

function openModal({ title, body, input = false, placeholder = '', initialValue = '', confirmLabel = 'Confirmar', confirmClass = 'btn-danger', onConfirm }) {
  document.getElementById('modal-title').textContent    = title;
  document.getElementById('modal-body').textContent     = body;
  const inp = document.getElementById('modal-input');
  if (input) {
    inp.style.display   = 'block';
    inp.placeholder     = placeholder;
    inp.value           = initialValue;
    setTimeout(() => inp.focus(), 50);
  } else {
    inp.style.display = 'none';
  }
  const btn = document.getElementById('modal-confirm');
  btn.textContent = confirmLabel;
  btn.className   = `btn ${confirmClass}`;
  document.getElementById('modal').classList.add('open');
  _modalConfirmCb = () => {
    const val = input ? document.getElementById('modal-input').value : null;
    onConfirm(val);
  };
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  _modalConfirmCb = null;
}

document.getElementById('modal-confirm').onclick = () => {
  if (_modalConfirmCb) _modalConfirmCb();
  closeModal();
};
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('modal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { if (_modalConfirmCb) _modalConfirmCb(); closeModal(); }
  if (e.key === 'Escape') closeModal();
});

// Materia config modal listeners
document.getElementById('matcfg-confirm').addEventListener('click', () => {
  const name = document.getElementById('matcfg-name').value.trim();
  if (!name) { toast('El nombre no puede estar vacío'); return; }
  const cfg = {
    name,
    startDate:       document.getElementById('matcfg-start').value || null,
    totalWeeks:      parseInt(document.getElementById('matcfg-weeks').value) || 0,
    sessionsPerWeek: parseInt(document.getElementById('matcfg-spw').value)   || 1,
    lossPercent:     parseFloat(document.getElementById('matcfg-loss').value) || 25
  };
  if (_materiaModalCb) _materiaModalCb(cfg);
  closeMateriaModal();
});

document.getElementById('modal-materia-cfg').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeMateriaModal();
});

document.getElementById('matcfg-name').addEventListener('keydown', e => {
  if (e.key === 'Enter')  document.getElementById('matcfg-confirm').click();
  if (e.key === 'Escape') closeMateriaModal();
});

['matcfg-weeks', 'matcfg-spw', 'matcfg-loss'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateMatcfgSummary);
});

window.addEventListener('beforeunload', (e) => {
  if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});

// ===================================================
//  TEMA (claro / oscuro)
// ===================================================
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light-mode');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  updateThemeBtn();
}

function updateThemeBtn() {
  const isLight = document.documentElement.classList.contains('light-mode');
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  btn.querySelector('use').setAttribute('href', isLight ? '#ic-moon' : '#ic-sun');
  const lbl = isLight ? 'Cambiar a modo oscuro' : 'Cambiar a modo claro';
  btn.setAttribute('aria-label', lbl);
  btn.title = lbl;
}

//  INIT

load();
updateThemeBtn();
renderMateriaBar();
renderStudents();
markClean(`Guardado · ${_timeNow()}`);
const _today = new Date().toISOString().slice(0, 10);
document.getElementById('jump-date').value = _today;
document.getElementById('jump-date').max   = _today;
</script>
